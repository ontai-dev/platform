            - nodeRole
            - talosConfigSecretRef
            type: object
          status:
            description: SeamInfrastructureMachineStatus defines the observed state
              of SeamInfrastructureMachine.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  SeamInfrastructureMachine.
                items:
