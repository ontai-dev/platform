---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: machineconfigsyncs.platform.ontai.dev
spec:
  group: platform.ontai.dev
  names:
    kind: MachineConfigSync
    listKind: MachineConfigSyncList
    plural: machineconfigsyncs
    shortNames:
    - mcs
    singular: machineconfigsync
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .spec.nodeClass
      name: Class
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MachineConfigSync is a day-2 operation CR that drives a Conductor exec Job to apply
          a Talos machineconfig from the canonical source-of-truth Secret to target nodes.

          Created by:
            - TalosClusterReconciler on Secret content hash change (RECON-A6)
            - import flow after reading node configs (RECON-A2: reason=import-initial-sync)
            - day2 op completion hooks (RECON-A7: reason=day2-{capability}-complete)

          Named Conductor capability: machineconfig-sync. platform-schema.md §15.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MachineConfigSyncSpec defines the desired state of MachineConfigSync.
              platform-schema.md §15.
            properties:
              clusterRef:
                description: ClusterRef references the TalosCluster this sync targets.
                properties:
                  name:
                    description: Name is the object name.
                    type: string
                  namespace:
                    description: Namespace is the object namespace. May be empty for
                      cluster-scoped objects.
                    type: string
                required:
                - name
                type: object
              forceApply:
                description: |-
                  ForceApply skips the hash-equality check and reapplies the machineconfig
                  even if the node-side hash already matches. Use for repair scenarios.
                type: boolean
              lineage:
                description: |-
                  Lineage is the sealed causal chain record for this root declaration.
                  Authored once at object creation time and immutable thereafter.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              maxRetry:
                default: 3
                description: |-
                  MaxRetry is the maximum number of times the reconciler will re-submit the
                  Conductor executor Job after a failure before declaring permanent failure
                  and setting HumanInterventionRequired on the owning TalosCluster.
                  Defaults to 3 when unset or zero.
                minimum: 1
                type: integer
              nodeClass:
                description: |-
                  NodeClass identifies which class of machineconfig to sync.
                  Values: "controlplane", "worker", "node-{node-name}", or a compiler-generated
                  per-node short name such as "cp1", "cp2", "cp3".
                minLength: 1
                type: string
              nodeRef:
                description: |-
                  NodeRef is the IP address of the specific node that this sync targets.
                  When set, the Conductor executor applies the machineconfig to only this node
                  rather than all nodes enumerated in the cluster talosconfig. Used for
                  per-node import targeting (PLT-BUG-3-ARCH): one MachineConfigSync CR per
                  node, each pointing at a compiler-generated per-node secret via NodeClass.
                  When empty, the conductor applies to all nodes in the cluster talosconfig
                  (default class-based behavior).
                type: string
              reason:
                description: |-
                  Reason is a human-readable trigger description for the audit trail.
                  Examples: "import-initial-sync", "secret-content-changed", "day2-upgrade-complete".
                type: string
            required:
            - clusterRef
            - nodeClass
            type: object
          status:
            description: MachineConfigSyncStatus defines the observed state of MachineConfigSync.
            properties:
              conditions:
                description: |-
                  Conditions is the list of status conditions for this MachineConfigSync.
                  Condition types: Ready, Degraded, LineageSynced.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobName:
                description: JobName is the name of the Conductor executor Job submitted
                  for this sync.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the spec last
                  reconciled.
                format: int64
                type: integer
              observedHash:
                description: |-
                  ObservedHash is the SHA-256 hash of the machineconfig bytes that were applied.
                  Copied from the machineconfig Secret's sync-hash label after Job completion.
                type: string
              operationResult:
                description: OperationResult is the result message from the Conductor
                  OperationResult ConfigMap.
                type: string
              retryCount:
                description: |-
                  RetryCount is the number of Job submission attempts that have failed so far.
                  Reset to zero on successful Job completion.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
