  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: talosmachineconfigrestores.platform.ontai.dev
spec:
  group: platform.ontai.dev
  names:
    kind: TalosMachineConfigRestore
    listKind: TalosMachineConfigRestoreList
    plural: talosmachineconfigrestores
    shortNames:
    - mcr
    singular: talosmachineconfigrestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .spec.backupTimestamp
      name: Timestamp
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TalosMachineConfigRestore triggers a machine config restore for target nodes of a
          cluster. The Conductor executor downloads each node's config from S3 at
          {cluster}/machineconfigs/{backupTimestamp}/{hostname}.yaml and applies it via
          ApplyConfiguration. Named Conductor capability: machineconfig-restore.
          platform-schema.md §11.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TalosMachineConfigRestoreSpec defines the desired state of
              TalosMachineConfigRestore.
            properties:
              backupTimestamp:
                description: |-
                  BackupTimestamp identifies which backup to restore from. Must match the
                  timestamp component of the S3 path written by a prior machineconfig-backup
                  operation: {cluster}/machineconfigs/{backupTimestamp}/{hostname}.yaml.
                  Format: 20060102T150405Z (UTC).
                type: string
              clusterRef:
                description: |-
                  ClusterRef references the TalosCluster whose nodes will have their machine
                  config restored.
                properties:
                  name:
                    description: Name is the object name.
                    type: string
                  namespace:
                    description: Namespace is the object namespace. May be empty for
                      cluster-scoped objects.
                    type: string
                required:
                - name
                type: object
              lineage:
                description: Lineage is the sealed causal chain record for this root
                  declaration.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              s3BackupSecretRef:
                description: |-
                  S3BackupSecretRef references a Secret containing S3 credentials.
                  Falls back to seam-etcd-backup-config in seam-system when absent.
                  platform-schema.md §10.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              s3SourceBucket:
                description: |-
                  S3SourceBucket is the S3 bucket containing the backup objects. Must match
                  the bucket used during the original machineconfig-backup operation.
                type: string
              targetNodes:
                description: |-
                  TargetNodes is the optional list of node hostnames to restore. When empty
                  all nodes in the cluster are restored. When set only the listed hostnames
                  are restored.
                items:
                  type: string
                type: array
            required:
            - backupTimestamp
            - clusterRef
            - s3SourceBucket
            type: object
          status:
            description: TalosMachineConfigRestoreStatus defines the observed state
              of TalosMachineConfigRestore.
            properties:
              conditions:
                description: |-
                  Conditions is the list of status conditions for this TalosMachineConfigRestore.
                  Condition types: Ready, Running, Degraded, S3SourceAbsent, LineageSynced.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobName:
                description: JobName is the name of the most recently submitted Conductor
                  executor Job.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the spec last
                  reconciled.
                format: int64
                type: integer
              operationResult:
                description: OperationResult is the message from the Conductor OperationResult
                  ConfigMap.
                type: string
              phase:
                description: |-
                  Phase is the current phase of the restore operation.
                  One of: Pending, Running, Succeeded, Failed, PartiallyFailed.
                type: string
              restoredNodes:
                description: RestoredNodes is the list of node hostnames successfully
                  restored.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
