---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: talosclusters.seam.ontai.dev
spec:
  group: seam.ontai.dev
  names:
    kind: TalosCluster
    listKind: TalosClusterList
    plural: talosclusters
    shortNames:
    - tc
    singular: taloscluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.role
      name: Role
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TalosCluster is the platform CRD for a Talos cluster under Seam governance.
          platform-schema.md §4. Decision H. seam.ontai.dev/v1alpha1.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TalosClusterSpec is the declared desired state of a TalosCluster.
              platform-schema.md §4.
            properties:
              capi:
                description: CAPI holds CAPI integration settings. When absent, direct
                  bootstrap is used.
                properties:
                  ciliumPackRef:
                    description: CiliumPackRef references the cluster-specific Cilium
                      PackDelivery.
                    properties:
                      name:
                        description: Name is the PackDelivery CR name for the Cilium
                          pack.
                        type: string
                      version:
                        description: Version is the PackDelivery version string.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  controlPlane:
                    description: ControlPlane holds control plane configuration. Required
                      when Enabled=true.
                    properties:
                      replicas:
                        description: Replicas is the desired number of control plane
                          nodes.
                        format: int32
                        type: integer
                    type: object
                  enabled:
                    description: Enabled determines whether this TalosCluster uses
                      the CAPI path.
                    type: boolean
                  kubernetesVersion:
                    description: KubernetesVersion is the Kubernetes version for TalosControlPlane.
                    type: string
                  talosVersion:
                    description: TalosVersion is the Talos version to use for TalosConfigTemplate
                      generation.
                    type: string
                  workers:
                    description: Workers is the list of worker node pools.
                    items:
                      description: CAPIWorkerPool declares a worker node pool for
                        a CAPI-managed target cluster.
                      properties:
                        name:
                          description: Name is the pool identifier. Used as the MachineDeployment
                            name suffix.
                          type: string
                        replicas:
                          description: Replicas is the desired number of worker nodes
                            in this pool.
                          format: int32
                          type: integer
                        seamInfrastructureMachineNames:
                          description: |-
                            SeamInfrastructureMachineNames lists the SeamInfrastructureMachine CR names
                            pre-provisioned for this pool. One per node.
                          items:
                            type: string
                          type: array
                      required:
                      - name
                      type: object
                    type: array
                required:
                - enabled
                type: object
              clusterEndpoint:
                description: ClusterEndpoint is the cluster VIP or primary API endpoint
                  IP.
                type: string
              hardeningProfileRef:
                description: |-
                  HardeningProfileRef references a HardeningProfile CR to apply at bootstrap.
                  platform-schema.md §11.
                properties:
                  name:
                    description: Name is the object name.
                    type: string
                  namespace:
                    description: Namespace is the object namespace. May be empty for
                      cluster-scoped objects.
                    type: string
                required:
                - name
                type: object
              infrastructureProvider:
                allOf:
                - enum:
                  - native
                  - capi
                  - screen
                - enum:
                  - native
                  - capi
                  - screen
                default: native
                description: InfrastructureProvider declares the infrastructure provider
                  backing this cluster.
                type: string
              kubeconfigSecretRef:
                description: |-
                  KubeconfigSecretRef is the name of the Secret containing the kubeconfig.
                  Required on mode=import. Not used when CAPI manages the lifecycle.
                type: string
              kubernetesVersion:
                description: |-
                  KubernetesVersion is the Kubernetes version for this cluster. When
                  spec.versionUpgrade=true, setting this field drives an UpgradeTypeKubernetes
                  UpgradePolicy. Setting both talosVersion and kubernetesVersion drives an
                  UpgradeTypeStack policy (sequential Talos then Kubernetes upgrade).
                type: string
              lineage:
                description: Lineage is the sealed causal chain record. Immutable
                  after creation.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              mode:
                allOf:
                - enum:
                  - bootstrap
                  - import
                - enum:
                  - bootstrap
                  - import
                description: Mode declares whether this cluster is bootstrapped from
                  scratch or imported.
                type: string
              nodeAddresses:
                description: NodeAddresses is the list of node IPs for DSNSReconciler
                  A-record population.
                items:
                  type: string
                type: array
              pkiRotationThresholdDays:
                default: 30
                description: |-
                  PkiRotationThresholdDays is the days before cert expiry at which a PKIRotation
                  CR is auto-created. Default 30. platform-schema.md §13.
                format: int32
                minimum: 1
                type: integer
              role:
                allOf:
                - enum:
                  - management
                  - tenant
                - enum:
                  - management
                  - tenant
                description: Role declares the cluster role in the Seam topology.
                  Mandatory on mode=import.
                type: string
              talosVersion:
                description: TalosVersion is the Talos OS version for this cluster.
                  INV-012.
                type: string
              talosconfigSecretRef:
                description: TalosconfigSecretRef is the name of the Secret containing
                  the talosconfig.
                type: string
              versionUpgrade:
                description: |-
                  VersionUpgrade, when set to true, triggers a cluster-level rolling upgrade.
                  Upgrade type is derived from which version fields are set:
                    - talosVersion only: UpgradeTypeTalos
                    - kubernetesVersion only: UpgradeTypeKubernetes
                    - both: UpgradeTypeStack (sequential Talos then k8s)
                type: boolean
            required:
            - mode
            type: object
            x-kubernetes-validations:
            - message: role is required when mode is import
              rule: self.mode != 'import' || (has(self.role) && self.role != '')
          status:
            description: TalosClusterStatus is the observed state of a TalosCluster.
            properties:
              capiClusterRef:
                description: |-
                  CAPIClusterRef is a reference to the owned CAPI Cluster object.
                  Only set for CAPI-managed clusters (capi.enabled=true).
                properties:
                  name:
                    description: Name is the object name.
                    type: string
                  namespace:
                    description: Namespace is the object namespace. May be empty for
                      cluster-scoped objects.
                    type: string
                required:
                - name
                type: object
              conditions:
                description: Conditions is the list of status conditions for this
                  TalosCluster.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              observedTalosVersion:
                description: ObservedTalosVersion is the Talos version last confirmed
                  running.
                type: string
              origin:
                description: Origin records how this cluster came under Seam governance.
                enum:
                - bootstrapped
                - imported
                type: string
              pkiExpiryDate:
                description: |-
                  PkiExpiryDate is the earliest certificate expiry across the talosconfig and
                  kubeconfig Secrets. Set by the TalosCluster reconciler. platform-schema.md §13.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
