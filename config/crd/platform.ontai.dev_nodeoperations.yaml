                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              operation:
                allOf:
                - enum:
                  - scale-up
                  - decommission
                  - reboot
                - enum:
                  - scale-up
                  - decommission
                  - reboot
                description: Operation declares the node lifecycle operation to perform.
                type: string
              replicaCount:
                description: |-
                  ReplicaCount is the desired number of worker replicas after scale-up.
                  Required when operation=scale-up.
                format: int32
                type: integer
              targetNodes:
                description: |-
                  TargetNodes is the list of node names to target for decommission or reboot.
                  Required when operation=decommission or operation=reboot.
                items:
                  type: string
                type: array
            required:
            - clusterRef
            - operation
            type: object
          status:
            description: NodeOperationStatus defines the observed state of NodeOperation.
            properties:
              conditions:
                description: |-
                  Conditions is the list of status conditions for this NodeOperation.
                  Condition types: Ready, Degraded, CAPIDelegated, LineageSynced.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
