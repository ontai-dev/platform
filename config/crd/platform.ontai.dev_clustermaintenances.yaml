kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: clustermaintenances.platform.ontai.dev
spec:
  group: platform.ontai.dev
  names:
    kind: ClusterMaintenance
    listKind: ClusterMaintenanceList
    plural: clustermaintenances
    shortNames:
    - cmaint
    singular: clustermaintenance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .status.conditions[?(@.type=="Paused")].status
      name: Paused
      type: string
    - jsonPath: .status.conditions[?(@.type=="WindowActive")].status
      name: WindowActive
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterMaintenance is a maintenance window gate for a Talos cluster.

          Dual-path CRD governed by spec.capi.enabled on the owning TalosCluster:
            - For CAPI-managed clusters (capi.enabled=true): sets
              cluster.x-k8s.io/paused=true on the CAPI Cluster when no active window
              exists and blockOutsideWindows=true. Pause halts all CAPI reconciliation
              until the window opens and the annotation is lifted.
            - For management cluster (capi.enabled=false): blocks Conductor Job
              admission for the cluster during restricted periods.

          platform-schema.md §5.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterMaintenanceSpec defines the desired state of ClusterMaintenance.
            properties:
              blockOutsideWindows:
                description: |-
                  BlockOutsideWindows controls whether operations are blocked when no active
                  window exists. When false (default), operations are permitted at any time.
                  When true and no active window exists:
                    - CAPI path: sets cluster.x-k8s.io/paused=true on the CAPI Cluster, halting
                      all CAPI reconciliation until the window opens.
                    - Non-CAPI path: blocks Conductor Job admission for this cluster.
                type: boolean
              clusterRef:
                description: ClusterRef references the TalosCluster this maintenance
                  gate controls.
                properties:
                  name:
                    description: Name is the object name.
                    type: string
                  namespace:
                    description: Namespace is the object namespace. May be empty for
                      cluster-scoped objects.
                    type: string
                required:
                - name
                type: object
              lineage:
                description: |-
                  Lineage is the sealed causal chain record for this root declaration.
                  Authored once at object creation time and immutable thereafter.
                  seam-core-schema.md §5, CLAUDE.md §14 Decision 1.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              windows:
                description: |-
                  Windows is the list of maintenance windows during which operations are permitted.
                  When empty, operations are always permitted (unless blockOutsideWindows=true
                  with no windows, in which case operations are always blocked).
                items:
                  description: |-
                    MaintenanceWindow defines a time window during which maintenance operations
                    are permitted.
                  properties:
                    durationMinutes:
                      description: DurationMinutes is the length of the maintenance
                        window in minutes.
                      format: int32
                      type: integer
                    name:
                      description: Name is an optional label for this window.
                      type: string
                    start:
                      description: |-
                        Start is the window start time in cron format (e.g., "0 2 * * 6" for
                        02:00 every Saturday UTC).
                      type: string
                    timezone:
                      description: |-
                        Timezone is the IANA timezone for interpreting the cron schedule.
                        Defaults to UTC.
                      type: string
                  required:
                  - durationMinutes
                  - start
                  type: object
                type: array
            required:
            - clusterRef
            type: object
          status:
            description: ClusterMaintenanceStatus defines the observed state of ClusterMaintenance.
            properties:
              activeWindowName:
                description: |-
                  ActiveWindowName is the name of the currently active maintenance window,
                  or empty if no window is currently active.
                type: string
              conditions:
                description: |-
                  Conditions is the list of status conditions for this ClusterMaintenance.
                  Condition types: Paused, WindowActive, LineageSynced.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the generation of the spec last
                  reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
