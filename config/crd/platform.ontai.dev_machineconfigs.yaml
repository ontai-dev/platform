kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: machineconfigs.platform.ontai.dev
spec:
  group: platform.ontai.dev
  names:
    kind: MachineConfig
    listKind: MachineConfigList
    plural: machineconfigs
    shortNames:
    - mc
    singular: machineconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.role
      name: Role
      type: string
    - jsonPath: .spec.order
      name: Order
      type: integer
    - jsonPath: .spec.nodeIP
      name: NodeIP
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MachineConfig is the first-class CRD for a Talos node configuration.
          Replaces machineconfig Kubernetes Secrets. Admin-authored (via compiler bootstrap
          or compiler addnode). Platform reads this CR via MachineConfigSync to drive
          Conductor machineconfig-sync Jobs. platform.ontai.dev/v1alpha1.

          Named convention: seam-mc-{cluster}-{bare-hostname}.
          Namespace: seam-tenant-{cluster}.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MachineConfigSpec declares the node configuration for a single Talos node.
              machine and cluster root sections mirror the Talos v1alpha1 config structure.
              These fields use unstructured JSON to remain Talos-version-agnostic.
            properties:
              cluster:
                description: |-
                  Cluster holds the Talos cluster-level configuration as unstructured JSON.
                  Corresponds to the top-level "cluster:" section of a Talos v1alpha1 config.
                x-kubernetes-preserve-unknown-fields: true
              clusterRef:
                description: ClusterRef references the TalosCluster this node belongs
                  to.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              machine:
                description: |-
                  Machine holds the Talos machine-level configuration as unstructured JSON.
                  Corresponds to the top-level "machine:" section of a Talos v1alpha1 config.
                  Version-agnostic: stored as raw JSON so it survives Talos API version bumps.
                x-kubernetes-preserve-unknown-fields: true
              nodeHostname:
                description: NodeHostname is the node hostname as declared in the
                  cluster-input spec.
                type: string
              nodeIP:
                description: NodeIP is the primary IPv4 address of the node (Talos
                  API port 50000).
                type: string
              order:
                description: |-
                  Order controls upgrade sequencing. Nodes with lower Order values are
                  upgraded first. init node = 0, control-plane nodes = 1..N, workers = N+1..M.
                format: int32
                type: integer
              role:
                allOf:
                - enum:
                  - init
                  - controlplane
                  - worker
                - enum:
                  - init
                  - controlplane
                  - worker
                description: 'Role is the Talos node role: init, controlplane, or
                  worker.'
                type: string
            required:
            - clusterRef
            - nodeHostname
            - nodeIP
            - order
            - role
            type: object
          status:
            description: MachineConfigStatus is the observed state of a MachineConfig.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  MachineConfig.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncedAt:
                description: LastSyncedAt is the UTC timestamp of the last confirmed
                  successful apply.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation most recently
                  reconciled.
                format: int64
                type: integer
              syncedVersion:
                description: |-
                  SyncedVersion records the Talos version string at the time of the last
                  confirmed successful machineconfig apply (e.g., "v1.9.3").
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
