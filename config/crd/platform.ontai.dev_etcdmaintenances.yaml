                    type: object
                  key:
                    description: Key is the S3 object key path.
                    type: string
                required:
                - bucket
                - credentialsSecretRef
                - key
                type: object
              s3SnapshotPath:
                description: |-
                  S3SnapshotPath is the S3 location of the snapshot to restore from.
                  Required when operation=restore.
                properties:
                  bucket:
                    description: Bucket is the S3 bucket name.
                    type: string
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef references the Secret containing S3 credentials.
                      The Secret must be in ont-system.
                    properties:
                      name:
                        description: Name is the Secret name.
                        type: string
                      namespace:
                        description: |-
