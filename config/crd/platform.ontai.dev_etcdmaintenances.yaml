                x-kubernetes-list-type: map
              jobName:
                description: JobName is the name of the most recently submitted Conductor
                  executor Job.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation of the spec last
                  reconciled.
                format: int64
                type: integer
              operationResult:
                description: OperationResult is the message from the Conductor OperationResult
                  ConfigMap.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
