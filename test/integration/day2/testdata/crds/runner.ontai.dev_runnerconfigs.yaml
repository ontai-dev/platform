---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: runnerconfigs.runner.ontai.dev
spec:
  group: runner.ontai.dev
  names:
    kind: RunnerConfig
    listKind: RunnerConfigList
    plural: runnerconfigs
    shortNames:
    - rc
    singular: runnerconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .spec.runnerImage
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RunnerConfig is the operator-generated operational contract
          between operators and Conductor for a specific cluster or pack. Generated
          at runtime by Platform or Wrapper using the shared runner library. Never
          human-authored. conductor-schema.md §5.
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation
              of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource
              this object represents.
            type: string
          metadata:
            type: object
          spec:
            description: RunnerConfigSpec is the operator-generated operational
              contract for a specific cluster or pack.
            properties:
              clusterRef:
                description: ClusterRef identifies the cluster this RunnerConfig
                  governs.
                type: string
              maintenanceTargetNodes:
                description: MaintenanceTargetNodes is the list of node names
                  that are the subject of the operation. conductor-schema.md §13.
                items:
                  type: string
                type: array
              operationalHistory:
                description: OperationalHistory is an append-only record of every
                  configuration change applied to this RunnerConfig.
                items:
                  description: OperationalHistoryEntry records a single configuration
                    change applied to a RunnerConfig.
                  properties:
                    appliedAt:
                      description: AppliedAt is the time this entry was written.
                      format: date-time
                      type: string
                    concern:
                      description: Concern describes what was changed.
                      type: string
                    description:
                      description: Description provides human-readable context.
                      type: string
                    version:
                      description: Version is the runner image version at the
                        time of this change.
                      type: string
                  required:
                  - appliedAt
                  - concern
                  type: object
                type: array
              operatorLeaderNode:
                description: OperatorLeaderNode is the node hosting the leader
                  pod of the initiating operator. conductor-schema.md §13.
                type: string
              phases:
                description: Phases declares the applicable execution phases for
                  this RunnerConfig.
                items:
                  description: PhaseConfig carries per-phase parameters for the
                    runner's execution context.
                  properties:
                    name:
                      description: Name identifies the phase.
                      type: string
                    parameters:
                      additionalProperties:
                        type: string
                      description: Parameters carries phase-specific key-value
                        configuration.
                      type: object
                  required:
                  - name
                  type: object
                type: array
              runnerImage:
                description: RunnerImage is the fully qualified runner image
                  reference including tag.
                type: string
              selfOperation:
                description: SelfOperation is true when the Job execution cluster
                  and target cluster are the same. conductor-schema.md §13.
                type: boolean
              steps:
                description: Steps is the ordered list of steps in this multi-step
                  operation intent. conductor-schema.md §17.
                items:
                  description: RunnerConfigStep declares one step in a multi-step
                    operation intent.
                  properties:
                    capability:
                      description: Capability is the named capability identifier
                        Conductor execute mode dispatches for this step.
                      type: string
                    dependsOn:
                      description: DependsOn is an optional reference to a prior
                        step name. The step is not eligible until the referenced
                        step has reached Succeeded state.
                      type: string
                    haltOnFailure:
                      description: HaltOnFailure controls sequencer behaviour when
                        this step fails. When true, failure terminates the
                        RunnerConfig with terminal condition Failed.
                      type: boolean
                    name:
                      description: Name is the unique identifier for this step
                        within the RunnerConfig.
                      type: string
                    parameters:
                      additionalProperties:
                        type: string
                      description: Parameters is the input parameter map passed
                        to the capability at Job materialisation time.
                      type: object
                  required:
                  - capability
                  - name
                  type: object
                type: array
            required:
            - clusterRef
            - runnerImage
            type: object
          status:
            description: RunnerConfigStatus is populated by Conductor in agent
              mode. Never set by operators.
            properties:
              agentLeader:
                description: AgentLeader is the pod currently holding the leader
                  election lease.
                type: string
              agentVersion:
                description: AgentVersion is the Conductor image version currently
                  running as agent.
                type: string
              capabilities:
                description: Capabilities is the self-declared capability manifest.
                items:
                  description: CapabilityEntry describes a single named capability
                    provided by this Conductor version.
                  properties:
                    description:
                      description: Description is a human-readable summary.
                      type: string
                    name:
                      description: Name is the globally unique, immutable capability
                        identifier.
                      type: string
                    parameterSchema:
                      additionalProperties:
                        type: string
                      description: ParameterSchema maps parameter names to their
                        types.
                      type: object
                    version:
                      description: Version is the semver of this capability implementation.
                      type: string
                  required:
                  - name
                  - version
                  type: object
                type: array
              stepResults:
                description: StepResults is the ordered list of step result records
                  written by Conductor execute mode as each step completes.
                  conductor-schema.md §17.
                items:
                  description: RunnerConfigStepResult is the status record for one
                    completed step.
                  properties:
                    outputRef:
                      description: OutputRef is the reference to the ConfigMap in
                        ont-system from which the OperationResult was harvested.
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    phase:
                      description: Phase is the terminal phase of this step.
                      enum:
                      - Pending
                      - Running
                      - Succeeded
                      - Failed
                      type: string
                    result:
                      description: Result is the raw JSON OperationResult payload
                        harvested from the ConfigMap. Written verbatim.
                      type: string
                      format: byte
                    stepName:
                      description: StepName matches the Name field of the
                        corresponding RunnerConfigStep in spec.
                      type: string
                  required:
                  - phase
                  - stepName
                  type: object
                type: array
              conditions:
                description: Conditions is the list of status conditions.
                items:
                  description: Condition contains details for one aspect of the
                    current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
